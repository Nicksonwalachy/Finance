<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
    <style>
        .table {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Controle Financeiro</h2>
        <form id="finance-form">
            <div class="form-group">
                <label for="description">Descrição</label>
                <input type="text" class="form-control" id="description" name="description" required>
            </div>
            <div class="form-group">
                <label for="amount">Valor</label>
                <input type="number" class="form-control" id="amount" name="amount" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="date">Data</label>
                <input type="date" class="form-control" id="date" name="date" required>
            </div>
            <div class="form-group">
                <label for="type">Tipo</label>
                <select class="form-control" id="type" name="type" required>
                    <option value="">Selecione</option>
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saída</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Adicionar Lançamento</button>
        </form>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Data</th>
                    <th>Tipo</th>
                </tr>
            </thead>
            <tbody id="finance-list">
            </tbody>
        </table>

        <button id="show-history" class="btn btn-info">Mostrar Histórico</button>
    </div>

    <script>
        $(document).ready(function () {
            const financeList = $("#finance-list");
            const showHistory = $("#show-history");

            showHistory.click(function () {
                // Adicione aqui o código para exibir o histórico de lançamentos
            });

            $("#finance-form").submit(function (event) {
                event.preventDefault();

                const description = $("#description").val();
                const amount = $("#amount").val();
                const date = $("#date").val();
                const type = $("#type").val();

                // Adicione aqui o código para salvar o lançamento no servidor

                // Exibir lançamento na tabela
                financeList.append(`
                    <tr>
                        <td>${description}</td>
                        <td>${amount}</td>
                        <td>${date}</td>
                        <td>${type}</td>
                    </tr>
                `);

                // Limpar campos do formulário
                $(this).trigger("reset");
            });
        });
    </script>
</body>
</html>
